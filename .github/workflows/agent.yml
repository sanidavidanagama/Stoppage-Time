name: Stoppage Time Agent

on:
  schedule:
    - cron: '30 * * * *'   # every hour at :30
  workflow_dispatch:         # manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run agent
        env:
          ARENA_KEY:               ${{ secrets.ARENA_KEY }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          ST_SUPABASE_URL:         ${{ secrets.ST_SUPABASE_URL }}
          ST_SUPABASE_SECRET_KEY:  ${{ secrets.ST_SUPABASE_SECRET_KEY }}
        run: uv run main.py